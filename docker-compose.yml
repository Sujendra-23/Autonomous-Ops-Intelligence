services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aoi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aoi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aoi}
      POSTGRES_DB: ${POSTGRES_DB:-aoi}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - aoi_pg_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aoi} -d ${POSTGRES_DB:-aoi}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: aoi-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aoi-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aoi}:${POSTGRES_PASSWORD:-aoi}@postgres:5432/${POSTGRES_DB:-aoi}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aoi-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aoi}:${POSTGRES_PASSWORD:-aoi}@postgres:5432/${POSTGRES_DB:-aoi}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    command: python -m app.workers.scheduler

  frontend:
    image: node:20-alpine
    container_name: aoi-frontend
    working_dir: /app
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:${BACKEND_PORT:-8000}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  aoi_pg_data:
